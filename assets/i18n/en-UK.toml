cs_gpu                           = "GPU Selection"
cs_gpu_desc                      = "Select which GPU device to use for computation. Auto-detected from the configured Python environment."
cs_vram                          = "VRAM Mode"
cs_vram_desc                     = "How aggressively to offload tensors between VRAM and RAM. Lower modes save VRAM but slow generation as models swap in and out."
cs_vram_default                  = "Default (auto)"
cs_vram_highvram                 = "High VRAM"
cs_vram_lowvram                  = "Low VRAM"
cs_vram_novram                   = "No VRAM (CPU offload)"
cs_vram_cpu                      = "CPU only"
cs_gpu_only                      = "GPU Only"
cs_gpu_only_desc                 = "Keep text encoders / CLIP / VAE on the GPU as well. Avoids CPU-GPU transfers for faster runs, but uses more VRAM."
cs_reserve_vram                  = "Reserve VRAM (GB)"
cs_reserve_vram_desc             = "VRAM held back for the OS / other apps (float; empty = ComfyUI default). Too much limits loadable model size; too little risks system stuttering or OOM crashes."
cs_disable_smart_memory          = "Disable Smart Memory"
cs_disable_smart_memory_desc     = "Aggressively offload to RAM instead of keeping models in VRAM. Frees VRAM for larger models but increases load times between steps."
cs_enable_dynamic_vram           = "Enable Dynamic VRAM"
cs_enable_dynamic_vram_desc      = "Force dynamic VRAM management on systems where it isn't default. Improves VRAM utilisation for multi-model workflows, but may cause instability on some drivers."
cs_disable_dynamic_vram          = "Disable Dynamic VRAM"
cs_disable_dynamic_vram_desc     = "Use estimate-based model loading instead of dynamic VRAM. May reduce stuttering but risks OOM on tight VRAM budgets."
cs_async_offload                 = "Async Offload Streams"
cs_async_offload_desc            = "Number of weight-offload streams (empty = ComfyUI default, usually 2). More streams speed up model swapping but use extra VRAM."
cs_disable_async_offload         = "Disable Async Offload"
cs_disable_async_offload_desc    = "Turn off async weight offloading. Reduces GPU memory spikes at the cost of slower model swapping."
cs_force_channels_last           = "Force Channels Last"
cs_force_channels_last_desc      = "Use channels-last tensor layout for inference. Can speed up convolutions on modern GPUs, but some custom nodes may not be compatible."
cs_mmap_torch_files              = "mmap Torch Files"
cs_mmap_torch_files_desc         = "Use mmap when loading .ckpt / .pt files. Speeds up model loading and reduces peak RAM usage."
cs_disable_mmap                  = "Disable mmap"
cs_disable_mmap_desc             = "Don't use mmap when loading safetensors. Fixes rare loading errors on network drives at the cost of higher RAM usage."
cs_disable_pinned_memory         = "Disable Pinned Memory"
cs_disable_pinned_memory_desc    = "Don't use pinned host memory for transfers. Lowers RAM overhead but slows CPU-GPU data movement."
cs_fast                          = "Fast Optimizations"
cs_fast_desc                     = "Enable all experimental performance features. Speeds up generation but may introduce visual artefacts."
cs_force_precision               = "Force Precision"
cs_force_precision_desc          = "Override global model precision. Lower precision saves VRAM and speeds up inference but may reduce image quality."
cs_force_precision_default       = "Default"
cs_force_precision_fp16          = "Force fp16"
cs_force_precision_fp32          = "Force fp32"
cs_unet_precision                = "UNet Precision"
cs_unet_precision_desc           = "Precision used for the diffusion model. Lower precision cuts VRAM use and speeds sampling; too low may degrade detail."
cs_unet_precision_default        = "Default"
cs_unet_precision_fp32           = "fp32"
cs_unet_precision_bf16           = "bf16"
cs_unet_precision_fp16           = "fp16"
cs_unet_precision_fp8_e4m3fn     = "fp8 e4m3fn"
cs_unet_precision_fp8_e5m2       = "fp8 e5m2"
cs_unet_precision_fp8_e8m0fnu    = "fp8 e8m0fnu"
cs_unet_precision_fp64           = "fp64"
cs_vae_precision                 = "VAE Precision"
cs_vae_precision_desc            = "Precision used for VAE encode / decode. fp16 saves VRAM but can cause black or corrupted images on some models."
cs_vae_precision_default         = "Default"
cs_vae_precision_fp16            = "fp16 (may produce black images)"
cs_vae_precision_fp32            = "fp32"
cs_vae_precision_bf16            = "bf16"
cs_cpu_vae                       = "VAE on CPU"
cs_cpu_vae_desc                  = "Run the VAE on the CPU instead of the GPU. Frees significant VRAM for larger models, but encoding and decoding will take noticeably longer."
cs_text_encoder_precision        = "Text Encoder Precision"
cs_text_encoder_precision_desc   = "Storage / compute precision for the text encoder. Lower precision reduces VRAM but may slightly affect prompt adherence."
cs_text_encoder_precision_default = "Default"
cs_text_encoder_precision_fp16   = "fp16"
cs_text_encoder_precision_fp32   = "fp32"
cs_text_encoder_precision_bf16   = "bf16"
cs_text_encoder_precision_fp8_e4m3fn = "fp8 e4m3fn"
cs_text_encoder_precision_fp8_e5m2 = "fp8 e5m2"
cs_fp16_intermediates            = "FP16 Intermediates"
cs_fp16_intermediates_desc       = "Experimental: use fp16 for inter-node tensors. Saves VRAM between nodes but may cause precision loss in complex workflows."
cs_supports_fp8_compute          = "Supports FP8 Compute"
cs_supports_fp8_compute_desc     = "Pretend the device supports fp8 compute (for testing). On unsupported hardware this may crash or produce corrupted images."
cs_cross_attention               = "Cross-Attention Backend"
cs_cross_attention_desc          = "Which attention kernel to use. Affects speed and VRAM usage; an incompatible backend can cause crashes."
cs_cross_attention_default       = "Default (auto)"
cs_cross_attention_pytorch       = "PyTorch 2.0"
cs_cross_attention_split         = "Split"
cs_cross_attention_quad          = "Sub-quadratic"
cs_cross_attention_sage          = "Sage"
cs_cross_attention_flash         = "Flash"
cs_disable_xformers              = "Disable xformers"
cs_disable_xformers_desc         = "Force-disable xformers if it causes crashes. Falls back to a slower but more compatible attention kernel."
cs_upcast_attention              = "Upcast Attention"
cs_upcast_attention_desc         = "Override attention upcasting policy. Upcasting can eliminate visual artefacts but uses more VRAM and compute time."
cs_upcast_attention_default      = "Default"
cs_upcast_attention_force        = "Force upcasting"
cs_upcast_attention_dont         = "Disable all upcasting"
cs_cache_strategy                = "Cache Strategy"
cs_cache_strategy_desc           = "Top-level node caching mode (mutex with the LRU / RAM headroom fields below). Aggressive caching speeds re-runs but uses more RAM."
cs_cache_strategy_default        = "Default (RAM-pressure)"
cs_cache_strategy_classic        = "Classic (aggressive)"
cs_cache_strategy_none           = "None (recompute every run)"
cs_cache_lru                     = "LRU Cache Size"
cs_cache_lru_desc                = "Use LRU caching with N entries (overrides Strategy when non-empty). Higher values speed up repeated runs but consume more RAM."
cs_cache_ram                     = "RAM Cache Headroom (GB)"
cs_cache_ram_desc                = "RAM-pressure headroom: 'ACTIVE' or 'ACTIVE INACTIVE'. Larger headroom avoids swapping but leaves less RAM for cached results."
cs_listen                        = "Listen Address"
cs_listen_desc                   = "Bind address (empty = 127.0.0.1, '0.0.0.0,::' = all interfaces)"
cs_port                          = "Port"
cs_port_desc                     = "Server port (empty = 8188)"
cs_cors_origin                   = "CORS Origin"
cs_cors_origin_desc              = "Allow cross-origin from this URL (use '*' for any; empty = disabled)"
cs_max_upload_size               = "Max Upload (MB)"
