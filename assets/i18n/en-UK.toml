cs_preview_method_auto           = "Auto (let ComfyUI choose)"
cs_preview_method_latent2rgb     = "Latent2RGB (fast)"
cs_preview_method_taesd          = "TAESD (quality)"
cs_preview_size                  = "Preview Size"
cs_preview_size_desc             = "Max preview side length in pixels (empty = 512). Larger previews cost slightly more compute per sampling step."
cs_disable_metadata              = "Disable Save Metadata"
cs_disable_metadata_desc         = "Don't write workflow metadata into saved files. Reduces file size but you lose the ability to drag-and-drop images back into ComfyUI."
