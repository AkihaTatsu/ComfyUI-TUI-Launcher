cs_auto_launch                   = "Auto-Launch Browser"
cs_auto_launch_desc              = "Open ComfyUI in the default browser on startup. Convenient for quick access without typing the address; unwanted in headless or remote setups."
cs_disable_auto_launch           = "Disable Auto-Launch"
cs_disable_auto_launch_desc      = "Prevent auto-launching the browser even on builds that do it by default. Useful for headless servers or SSH sessions."
cs_enable_compress_response_body = "Compress Responses"
cs_enable_compress_response_body_desc = "Enable gzip compression for HTTP responses. Reduces bandwidth for remote access at a small CPU cost."
cs_multi_user                    = "Multi-User"
cs_multi_user_desc               = "Enable per-user storage. Keeps each user's settings and queues separate on shared servers."
cs_disable_all_custom_nodes      = "Disable All Custom Nodes"
cs_disable_all_custom_nodes_desc = "Load only built-in nodes (useful for diagnosing extension issues). Speeds up startup and avoids crashes from broken extensions."
cs_whitelist_custom_nodes        = "Whitelist Custom Nodes"
cs_whitelist_custom_nodes_desc   = "Space-separated folder names to load even when 'Disable All' is on. Lets you isolate which extension causes a problem."
cs_disable_api_nodes             = "Disable API Nodes"
cs_disable_api_nodes_desc        = "Skip API nodes and prevent the frontend from contacting the internet. Improves security on shared or public instances."
cs_enable_manager                = "Enable ComfyUI-Manager"
cs_enable_manager_desc           = "Turn on the bundled ComfyUI-Manager feature. Adds in-browser extension install and update capabilities."
cs_disable_manager_ui            = "Disable Manager UI"
cs_disable_manager_ui_desc       = "Keep Manager background tasks but hide its UI. Prevents accidental installs while keeping dependency checks active."
cs_enable_manager_legacy_ui      = "Manager Legacy UI"
cs_enable_manager_legacy_ui_desc = "Use the legacy ComfyUI-Manager UI. Helpful if the new Manager interface has compatibility issues with your browser."
cs_preview_method                = "Latent Preview Method"
