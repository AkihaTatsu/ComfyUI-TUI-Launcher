# Dynamic schema for the "ComfyUI Settings" screen.
# Top-level [[tab]] entries become sub-tabs. Each [[tab.field]] becomes a row.
# Field types: "toggle", "choice", "custom".
#
# String VALUES in `name`, `desc`, `label`, and tab `name` are i18n KEYS,
# not display text — resolved through `core::i18n::t()` at render time.
# Adding a new field: pick a key like `cs_<field_key>` and add the same
# key to every locale in `assets/i18n/*.toml` with the localised text.
#
# Rendering rules:
#   - A field is emitted to ComfyUI's command line only when its current value
#     differs from `default`.
#   - For "choice" fields with multiple mutually-exclusive flags, set
#     `default = ""` and let each option's `value` be the flag suffix; the
#     template `--{value}` expands to the actual flag.
#   - For "toggle" fields, `default = false` and `cli` is the bare flag.
#   - For "custom" fields, `default = ""` and `cli` substitutes `{value}`.
#
# Flag set mirrors comfy/cli_args.py as of ComfyUI 0.22+.

